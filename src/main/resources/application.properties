spring.application.name=gestion-academica-api

# BD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestionbd}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Hibernate crea/elimina las tablas desde las @Entity al arrancar/detener.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
spring.jpa.open-in-view=false

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# JWT (el modulo externo emite el token; aqui solo validamos)
app.security.jwt.secret=${JWT_SECRET:change-me-this-secret-is-at-least-32-bytes-long-please}
app.security.jwt.issuer=${JWT_ISSUER:gestion-academica}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Perfiles / Server
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
