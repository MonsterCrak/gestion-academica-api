spring.application.name=gestion-academica-api

# CONFIGURACION DE BD (variables de entorno)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestionbd}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACION JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
spring.jpa.open-in-view=false

# SWAGGER / OPENAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# CONFIGURACION JWT (modulo externo emite los tokens; aqui solo validamos)
app.security.jwt.secret=${JWT_SECRET:change-me-this-secret-is-at-least-32-bytes-long-please}
app.security.jwt.issuer=${JWT_ISSUER:gestion-academica}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# PERFILES
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# SERVER
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
